# ============================================
# HiveMind CI Pipeline
# ============================================
# Runs on every PR and push to main.
# Jobs: lint (ruff), test (pytest + PostgreSQL + Redis), docker (build check).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff check (lint errors)
        run: ruff check backend/

      - name: Ruff format check (formatting)
        run: ruff format --check backend/

  # ─── Unit Tests ──────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: hivemind_test
          POSTGRES_USER: hivemind
          POSTGRES_PASSWORD: hivemind_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hivemind -d hivemind_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://hivemind:hivemind_ci@localhost:5432/hivemind_test
      APP_ENV: testing
      APP_NAME: HiveMind
      APP_VERSION: 0.1.0
      LOG_LEVEL: WARNING
      # Redis for event bus
      REDIS_URL: redis://localhost:6379/0
      # Slack tokens intentionally blank — unit tests use mocks
      SLACK_BOT_TOKEN: ""
      SLACK_SIGNING_SECRET: ""
      SLACK_APP_TOKEN: ""
      SLACK_SOCKET_MODE: "false"
      # LLM tokens intentionally blank — unit tests use mocks
      LLM_API_KEY: ""
      LLM_PROVIDER: "openai"
      LLM_MODEL: "gpt-4o-mini"
      EMBEDDING_API_KEY: ""
      EMBEDDING_PROVIDER: "openai"
      # Digest disabled in CI
      DIGEST_ENABLED: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Alembic migrations
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Run unit tests
        working-directory: backend
        run: >-
          python -m pytest tests/ -v
          -m "not live"
          --ignore=tests/slack/test_live.py
          --tb=short

  # ─── Docker Build ────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t hivemind-backend:ci ./backend

      - name: Verify image exists
        run: docker image inspect hivemind-backend:ci > /dev/null
